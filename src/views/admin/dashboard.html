<div style="max-width: 800px; margin: 0 auto;">
    <h2 style="color: var(--color-primary);">📊 Dashboard Admin</h2>

    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px;">
        <div style="background: var(--bg-secondary); padding: 20px; border-radius: 10px; text-align: center;">
            <div style="font-size: 2rem;">✂️</div>
            <div style="font-size: 1.5rem; color: var(--color-primary);" id="total-barberos">—</div>
            <div>Barberos</div>
        </div>
        <div style="background: var(--bg-secondary); padding: 20px; border-radius: 10px; text-align: center;">
            <div style="font-size: 2rem;">💈</div>
            <div style="font-size: 1.5rem; color: var(--color-primary);" id="total-servicios">—</div>
            <div>Servicios</div>
        </div>
    </div>
</div>

<script>
    (function() {
        console.log('🔵 Ejecutando script de dashboard.html');
        
        const barberos = window.app?.estado?.cache?.barberos || [];
        const servicios = window.app?.estado?.cache?.servicios || [];
        
        console.log('📦 Dashboard datos:', barberos.length, 'barberos,', servicios.length, 'servicios');
        
        const totalBarberos = document.getElementById('total-barberos');
        if (totalBarberos) {
            totalBarberos.textContent = barberos.length;
        }
        
        const totalServicios = document.getElementById('total-servicios');
        if (totalServicios) {
            totalServicios.textContent = servicios.length;
        }
    })();
</script>
