<!-- src/views/admin/barberos/barberos.html -->
<div class="barberos-container">
    <!-- Header -->
    <div class="barberos-header">
        <div>
            <h2>✂️ Gestión de Barberos</h2>
            <p class="barberos-subtitle">Administra tu equipo de trabajo</p>
        </div>
        <button class="btn btn-primary" id="btn-nuevo-barbero">
            + Nuevo Barbero
        </button>
    </div>

    <!-- Filtros y búsqueda -->
    <div class="barberos-filtros">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" 
                   id="search-barbero" 
                   placeholder="Buscar por nombre, teléfono o email..."
                   class="search-input">
        </div>
        <div class="filtros-actions">
            <select id="filtro-estado" class="filtro-select">
                <option value="todos">Todos los barberos</option>
                <option value="activo">Activos</option>
                <option value="inactivo">Inactivos</option>
            </select>
            <select id="filtro-especialidad" class="filtro-select">
                <option value="todos">Todas las especialidades</option>
                <option value="Corte">✂️ Corte</option>
                <option value="Barba">🧔 Barba</option>
                <option value="Color">🎨 Color</option>
                <option value="Todo">✨ Todo</option>
            </select>
        </div>
    </div>

    <!-- Grid de Barberos -->
    <div class="barberos-grid" id="barberos-grid">
        <div class="loading-spinner">Cargando barberos...</div>
    </div>

    <!-- Paginación -->
    <div class="pagination" id="pagination">
        <button class="page-btn" id="prev-page" disabled>Anterior</button>
        <span id="page-info">Página 1 de 1</span>
        <button class="page-btn" id="next-page" disabled>Siguiente</button>
    </div>
</div>

<!-- Modal Nuevo/Editar Barbero -->
<div id="barbero-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">Nuevo Barbero</h3>
            <button class="modal-close">&times;</button>
        </div>
        <form id="barbero-form">
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre completo *</label>
                        <input type="text" id="barbero-nombre" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Teléfono *</label>
                        <input type="tel" id="barbero-telefono" required class="form-control">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="barbero-email" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Especialidad</label>
                        <select id="barbero-especialidad" class="form-control">
                            <option value="Corte">✂️ Corte</option>
                            <option value="Barba">🧔 Barba</option>
                            <option value="Color">🎨 Color</option>
                            <option value="Todo">✨ Todo</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Comisión (%)</label>
                        <input type="number" id="barbero-comision" min="0" max="100" value="40" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="barbero-estado" class="form-control">
                            <option value="activo">Activo</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Horario entrada</label>
                        <input type="time" id="barbero-horario-inicio" value="09:00" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Horario salida</label>
                        <input type="time" id="barbero-horario-fin" value="18:00" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label>Días de descanso</label>
                    <div class="dias-semana">
                        <label class="dia-checkbox"><input type="checkbox" value="Lun"> Lun</label>
                        <label class="dia-checkbox"><input type="checkbox" value="Mar"> Mar</label>
                        <label class="dia-checkbox"><input type="checkbox" value="Mié"> Mié</label>
                        <label class="dia-checkbox"><input type="checkbox" value="Jue"> Jue</label>
                        <label class="dia-checkbox"><input type="checkbox" value="Vie"> Vie</label>
                        <label class="dia-checkbox"><input type="checkbox" value="Sáb"> Sáb</label>
                        <label class="dia-checkbox"><input type="checkbox" value="Dom"> Dom</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Biografía / Notas</label>
                    <textarea id="barbero-biografia" rows="3" class="form-control" placeholder="Experiencia, habilidades especiales..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelar-modal">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Ver Barbero -->
<div id="barbero-ver-modal" class="modal" style="display: none;">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3>Detalles del Barbero</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="barbero-detalle"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="cerrar-ver-modal">Cerrar</button>
            <button class="btn btn-primary" id="editar-ver-modal">Editar</button>
        </div>
    </div>
</div>
