<div style="max-width: 800px; margin: 0 auto;">
    <h2 style="color: var(--color-primary);">📋 Mis Citas</h2>
    
    <div style="background: var(--bg-secondary); border-radius: 16px; padding: 20px; margin-bottom: 20px;">
        <h3>🔍 Buscar mis citas</h3>
        <p style="font-size: 0.85rem; margin-bottom: 15px;">Ingresa tu número de teléfono para ver tus citas</p>
        <div style="display: flex; gap: 10px;">
            <input type="tel" id="telefono-busqueda" placeholder="Ej: 555-1234" style="flex: 1; padding: 12px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-primary);">
            <button id="btn-buscar" style="padding: 12px 24px; background: var(--color-primary); border: none; border-radius: 10px; color: white; cursor: pointer;">Buscar 🔍</button>
        </div>
        <div id="mensaje-info" style="margin-top: 10px; font-size: 0.8rem; color: var(--text-secondary);"></div>
    </div>
    
    <div id="resultados" style="display: none;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color);">
            <button id="tab-proximas" class="tab-btn active" style="padding: 10px 20px; background: none; border: none; color: var(--color-primary); cursor: pointer; border-bottom: 2px solid var(--color-primary);">📅 Próximas</button>
            <button id="tab-historial" class="tab-btn" style="padding: 10px 20px; background: none; border: none; color: var(--text-secondary); cursor: pointer;">📜 Historial</button>
        </div>
        <div id="lista-proximas"></div>
        <div id="lista-historial" style="display: none;"></div>
    </div>
</div>

<script>
    (function() {
        console.log('🔵 Mis Citas - Versión corregida');
        
        let citasEncontradas = [];
        
        async function buscarCitas() {
            const telefono = document.getElementById('telefono-busqueda').value.trim();
            const infoDiv = document.getElementById('mensaje-info');
            
            if (!telefono) {
                infoDiv.innerHTML = '⚠️ Ingresa tu número de teléfono';
                infoDiv.style.color = '#f44336';
                return;
            }
            
            infoDiv.innerHTML = '🔍 Buscando...';
            infoDiv.style.color = 'var(--text-secondary)';
            
            // Obtener todas las citas
            const todasCitas = await window.storage.obtenerTodos('citas') || [];
            console.log('Total citas en DB:', todasCitas.length);
            
            // Filtrar por teléfono exacto
            citasEncontradas = todasCitas.filter(c => String(c.clienteTelefono) === String(telefono));
            console.log('Citas encontradas para', telefono, ':', citasEncontradas.length);
            
            if (citasEncontradas.length === 0) {
                infoDiv.innerHTML = `📞 No se encontraron citas para el teléfono: ${telefono}`;
                document.getElementById('resultados').style.display = 'block';
                document.getElementById('lista-proximas').innerHTML = '<div style="text-align: center; padding: 40px;">No hay citas</div>';
                document.getElementById('lista-historial').innerHTML = '';
                return;
            }
            
            infoDiv.innerHTML = `📞 Se encontraron ${citasEncontradas.length} citas`;
            document.getElementById('resultados').style.display = 'block';
            renderizarCitas();
        }
        
        function renderizarCitas() {
            const hoy = new Date().toISOString().split('T')[0];
            
            const proximas = citasEncontradas.filter(c => c.fecha >= hoy && c.estado !== 'cancelada')
                .sort((a, b) => a.fecha.localeCompare(b.fecha) || (a.hora || '').localeCompare(b.hora || ''));
            
            const historial = citasEncontradas.filter(c => c.fecha < hoy || c.estado === 'cancelada')
                .sort((a, b) => b.fecha.localeCompare(a.fecha));
            
            console.log('Próximas:', proximas.length, 'Historial:', historial.length);
            
            // Renderizar próximas
            const proximasDiv = document.getElementById('lista-proximas');
            if (proximas.length === 0) {
                proximasDiv.innerHTML = '<div style="text-align: center; padding: 20px;">No hay citas próximas</div>';
            } else {
                proximasDiv.innerHTML = proximas.map(c => `
                    <div style="background: var(--bg-tertiary); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 3px solid ${c.estado === 'pendiente' ? '#ff9800' : '#4caf50'};">
                        <div><strong>${c.servicioNombre || 'Servicio'}</strong> - $${c.precio || 0}</div>
                        <div>📅 ${c.fecha} - ${c.hora || '--:--'}</div>
                        <div>💈 ${c.barberoNombre || 'Barbero'}</div>
                        <div>📌 Estado: ${c.estado === 'pendiente' ? '⏳ Pendiente' : '✅ Confirmada'}</div>
                        ${c.estado !== 'cancelada' && c.fecha >= hoy ? `<button onclick="cancelarCita(${c.id})" style="margin-top: 10px; padding: 5px 10px; background: rgba(244,67,54,0.1); border: 1px solid #f44336; border-radius: 5px; color: #f44336; cursor: pointer;">Cancelar</button>` : ''}
                    </div>
                `).join('');
            }
            
            // Renderizar historial
            const historialDiv = document.getElementById('lista-historial');
            if (historial.length === 0) {
                historialDiv.innerHTML = '<div style="text-align: center; padding: 20px;">No hay historial</div>';
            } else {
                historialDiv.innerHTML = historial.map(c => `
                    <div style="background: var(--bg-tertiary); border-radius: 12px; padding: 15px; margin-bottom: 10px; opacity: 0.7; border-left: 3px solid ${c.estado === 'cancelada' ? '#f44336' : '#2196f3'};">
                        <div><strong>${c.servicioNombre || 'Servicio'}</strong> - $${c.precio || 0}</div>
                        <div>📅 ${c.fecha} - ${c.hora || '--:--'}</div>
                        <div>💈 ${c.barberoNombre || 'Barbero'}</div>
                        <div>📌 Estado: ${c.estado === 'cancelada' ? '❌ Cancelada' : '✅ Completada'}</div>
                    </div>
                `).join('');
            }
        }
        
        window.cancelarCita = async function(id) {
            if (!confirm('¿Cancelar esta cita?')) return;
            
            const todasCitas = await window.storage.obtenerTodos('citas') || [];
            const cita = todasCitas.find(c => c.id === id);
            if (cita) {
                cita.estado = 'cancelada';
                await window.storage.guardar('citas', cita);
                // Actualizar la lista local
                const index = citasEncontradas.findIndex(c => c.id === id);
                if (index !== -1) citasEncontradas[index].estado = 'cancelada';
                renderizarCitas();
                alert('✅ Cita cancelada');
            }
        };
        
        // Eventos
        document.getElementById('btn-buscar')?.addEventListener('click', buscarCitas);
        document.getElementById('telefono-busqueda')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarCitas();
        });
        
        document.getElementById('tab-proximas')?.addEventListener('click', () => {
            document.getElementById('tab-proximas').style.borderBottom = '2px solid var(--color-primary)';
            document.getElementById('tab-proximas').style.color = 'var(--color-primary)';
            document.getElementById('tab-historial').style.borderBottom = 'none';
            document.getElementById('tab-historial').style.color = 'var(--text-secondary)';
            document.getElementById('lista-proximas').style.display = 'block';
            document.getElementById('lista-historial').style.display = 'none';
        });
        
        document.getElementById('tab-historial')?.addEventListener('click', () => {
            document.getElementById('tab-historial').style.borderBottom = '2px solid var(--color-primary)';
            document.getElementById('tab-historial').style.color = 'var(--color-primary)';
            document.getElementById('tab-proximas').style.borderBottom = 'none';
            document.getElementById('tab-proximas').style.color = 'var(--text-secondary)';
            document.getElementById('lista-proximas').style.display = 'none';
            document.getElementById('lista-historial').style.display = 'block';
        });
        
        // Auto-buscar si hay teléfono guardado
        const telefonoGuardado = sessionStorage.getItem('cliente_telefono');
        if (telefonoGuardado) {
            document.getElementById('telefono-busqueda').value = telefonoGuardado;
            buscarCitas();
        }
    })();
</script>
