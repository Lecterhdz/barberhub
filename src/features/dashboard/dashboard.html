<!-- ─────────────────────────────────────────────────────────────────────
     BARBERHUB - DASHBOARD FEATURE VIEW
     ───────────────────────────────────────────────────────────────────── -->

<div class="dashboard-container">
    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="stat-citas-hoy">0</div>
            <div class="stat-label">📅 Citas Hoy</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-clientes-hoy">0</div>
            <div class="stat-label">👥 Clientes Hoy</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-ingresos-hoy">$0</div>
            <div class="stat-label">💰 Ingresos Hoy</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="stat-barberos-hoy">0</div>
            <div class="stat-label">✂️ Barberos Activos</div>
        </div>
    </div>

    <!-- Citas del Día -->
    <div class="card">
        <h2>📅 Citas de Hoy</h2>
        <div id="citas-hoy-lista"></div>
    </div>

    <!-- Acciones Rápidas -->
    <div class="card">
        <h2>⚡ Acciones Rápidas</h2>
        <div class="button-grid">
            <button onclick="window.router.navegar('/citas')" class="btn btn-primary">
                📅 Nueva Cita
            </button>
            <button onclick="window.router.navegar('/clientes')" class="btn btn-secondary">
                👥 Nuevo Cliente
            </button>
            <button onclick="window.router.navegar('/reportes')" class="btn btn-secondary">
                📄 Ver Reportes
            </button>
        </div>
    </div>
</div>
