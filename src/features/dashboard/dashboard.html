<!-- ─────────────────────────────────────────────────────────────────────
     BARBERHUB - DASHBOARD FEATURE VIEW
     ───────────────────────────────────────────────────────────────────── -->

<div class="dashboard-container">
    <!-- Header del Dashboard -->
    <div class="dashboard-header">
        <h2>Panel de Control</h2>
        <p class="dashboard-date" id="current-date"></p>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card" onclick="window.router.navegar('/citas')">
            <div class="stat-icon">📅</div>
            <div class="stat-value" id="citas-hoy">0</div>
            <div class="stat-label">Citas Hoy</div>
            <div class="stat-trend" id="citas-trend">+0%</div>
        </div>

        <div class="stat-card" onclick="window.router.navegar('/clientes')">
            <div class="stat-icon">👥</div>
            <div class="stat-value" id="clientes-totales">0</div>
            <div class="stat-label">Clientes Registrados</div>
            <div class="stat-trend" id="clientes-trend">+0</div>
        </div>

        <div class="stat-card" onclick="window.router.navegar('/caja')">
            <div class="stat-icon">💰</div>
            <div class="stat-value" id="ingresos-hoy">$0</div>
            <div class="stat-label">Ingresos Hoy</div>
            <div class="stat-trend" id="ingresos-trend">+0%</div>
        </div>

        <div class="stat-card" onclick="window.router.navegar('/servicios')">
            <div class="stat-icon">✂️</div>
            <div class="stat-value" id="servicios-totales">0</div>
            <div class="stat-label">Servicios Activos</div>
            <div class="stat-trend" id="servicios-trend">+0</div>
        </div>
    </div>

    <!-- Gráficos y Citas -->
    <div class="dashboard-grid">
        <!-- Gráfico de Ingresos -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">📈 Ingresos Semanales</h3>
                <select id="chart-period" class="chart-select">
                    <option value="7">Últimos 7 días</option>
                    <option value="30">Últimos 30 días</option>
                    <option value="90">Últimos 90 días</option>
                </select>
            </div>
            <div class="chart-container">
                <canvas id="revenue-chart"></canvas>
            </div>
        </div>

        <!-- Próximas Citas -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">📋 Próximas Citas</h3>
                <button class="btn-sm" onclick="window.router.navegar('/citas')">
                    Ver todas →
                </button>
            </div>
            <div id="proximas-citas" class="citas-list">
                <div class="loading-spinner">Cargando citas...</div>
            </div>
        </div>
    </div>

    <!-- Segunda fila -->
    <div class="dashboard-grid-2">
        <!-- Servicios Populares -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">⭐ Servicios Populares</h3>
                <button class="btn-sm" onclick="window.router.navegar('/servicios')">
                    Ver todos →
                </button>
            </div>
            <div id="servicios-populares" class="servicios-list">
                <div class="loading-spinner">Cargando servicios...</div>
            </div>
        </div>

        <!-- Actividad Reciente -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">🔄 Actividad Reciente</h3>
            </div>
            <div id="actividad-reciente" class="actividad-list">
                <div class="loading-spinner">Cargando actividad...</div>
            </div>
        </div>
    </div>
</div>
