<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    
    <!-- ✅ CSP simple en HEAD -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data:; connect-src 'self' https:;">
    
    <title>BarberHub - Gestión Inteligente para Barberías</title>
    
    <!-- ✅ Manifest con path relativo -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- ✅ Icono simple con emoji (evita data URLs complejas que causan 404) -->
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><text y='80' font-size='80'>💈</text></svg>">
    <!-- ✅ Core Styles con paths relativos al index.html -->
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/layout.css">
    <link rel="stylesheet" href="./src/core/themes/dark-amber.css">
    
    <!-- ✅ Feature CSS (se actualiza dinámicamente por app.js) -->
    <link rel="stylesheet" href="./src/features/auth/auth.css" id="feature-css">
</head>
<body>
    <!-- ✅ App Container -->
    <div id="app">
        <!-- Header (inyectado por app.js) -->
        <header id="app-header"></header>
        
        <!-- Main Content (cambiado por router.js) -->
        <main id="app-main"></main>
        
        <!-- Sidebar (inyectado por Sidebar.js) -->
        <aside id="app-sidebar"></aside>
        
        <!-- Footer (inyectado por app.js) -->
        <footer id="app-footer"></footer>
    </div>

    <!-- ✅ CORE SCRIPTS ONLY - El entry point que carga todo lo demás vía imports -->
    <script type="module" src="./src/core/utils.js"></script>
    <script type="module" src="./src/core/storage.js"></script>
    <script type="module" src="./src/core/router.js"></script>
    <script type="module" src="./src/core/app.js"></script>

    <!-- ✅ Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('✅ SW registrado:', reg.scope))
                .catch(err => console.log('⚠️ SW error:', err));
        }
    </script>
</body>
</html>
