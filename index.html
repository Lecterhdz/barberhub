<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <title>BarberHub - Gestión Inteligente para Barberías</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/layout.css">
    <link rel="stylesheet" href="./src/core/themes/dark-amber.css" id="theme-css">
    
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* Estilos iniciales para evitar pantalla negra */
        body {
            background: #1a1a1a;
            margin: 0;
            padding: 0;
        }
        #app {
            min-height: 100vh;
        }
        .loading-inicial {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
        }
        .loading-spinner-inicial {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-inicial" id="loading-inicial">
            <div class="loading-spinner-inicial"></div>
            <p>Cargando BarberHub...</p>
        </div>
        <header id="app-header"></header>
        <div class="app-layout">
            <aside id="app-sidebar"></aside>
            <main id="app-main"></main>
        </div>
        <footer id="app-footer"></footer>
    </div>

    <!-- Core Scripts -->
    <script type="module">
        import { app } from './src/core/app.js';
        
        // Ocultar loading cuando la app esté lista
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading-inicial');
                if (loading) loading.style.display = 'none';
            }, 500);
        });
        
        // Inicializar
        window.app = app;
        app.init();
    </script>
</body>
</html>
