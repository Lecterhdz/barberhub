<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    
    <!-- ✅ CSP simple en HEAD -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; connect-src 'self' https:;">
    
    <title>BarberHub - Gestión Inteligente para Barberías</title>
    
    <!-- ✅ Manifest con path relativo -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- ✅ Icono SIMPLE: emoji como fallback (evita data URLs complejas) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💈</text></svg>">
    
    <!-- ✅ Core Styles con paths absolutos desde repo root -->
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/layout.css">
    <link rel="stylesheet" href="./src/core/themes/dark-amber.css">
    
    <!-- Feature CSS (se actualiza dinámicamente) -->
    <link rel="stylesheet" href="./src/features/auth/auth.css" id="feature-css">
</head>
<body>
    <!-- App Container -->
    <div id="app">
        <header id="app-header"></header>
        <main id="app-main"></main>
        <aside id="app-sidebar"></aside>
        <footer id="app-footer"></footer>
    </div>

    <!-- ✅ Core Scripts con rutas relativas -->
    <script type="module" src="./src/core/utils.js"></script>
    <script type="module" src="./src/core/storage.js"></script>
    <script type="module" src="./src/core/router.js"></script>
    <script type="module" src="./src/core/app.js"></script>
    
    <!-- Config -->
    <script type="module" src="./src/config/routes.js"></script>
    <script type="module" src="./src/config/firebase.js"></script>
    
    <!-- Components -->
    <script type="module" src="./src/components/Button.js"></script>
    <script type="module" src="./src/components/Card.js"></script>
    <script type="module" src="./src/components/Modal.js"></script>
    <script type="module" src="./src/components/Sidebar.js"></script>
    
    <!-- Features -->
    <script type="module" src="./src/features/auth/auth.js"></script>
    <script type="module" src="./src/features/dashboard/dashboard.js"></script>

    <script>
        // ✅ Service Worker con ruta relativa
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('✅ SW registrado:', reg.scope))
                .catch(err => console.log('⚠️ SW error:', err));
        }
    </script>
</body>
</html>
