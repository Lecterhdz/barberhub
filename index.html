<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <title>BarberHub - Gestión Inteligente para Barberías</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="/barberhub/src/styles/variables.css">
    <link rel="stylesheet" href="/barberhub/src/styles/base.css">
    <link rel="stylesheet" href="/barberhub/src/styles/layout.css">
    <link rel="stylesheet" href="/barberhub/src/themes/dark-amber.css" id="theme-css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        .initial-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="initial-loader" class="initial-loader">
        <div class="loader-spinner"></div>
    </div>

    <div id="app">
        <header id="app-header"></header>
        <div class="app-layout">
            <aside id="app-sidebar"></aside>
            <main id="app-main"></main>
        </div>
        <footer id="app-footer"></footer>
    </div>

    <script type="module" src="/barberhub/src/main.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('initial-loader');
                if (loader) loader.style.display = 'none';
            }, 500);
        });
    </script>
</body>
</html>
